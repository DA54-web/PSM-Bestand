<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>PSM-Bestandsbuch</title>
<style>
  :root{
    --bg:#f5f3ed;
    --card:#ffffff;
    --line:#e2ddd0;
    --ink:#20241f;
    --ink-soft:#5b6058;
    --green:#2b4735;
    --green-dark:#1c3024;
    --amber:#c98a2e;
    --amber-soft:#f4e2c4;
    --red:#b3261e;
    --red-soft:#f6dcda;
    --radius:14px;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  body{padding-top:calc(var(--safe-top) + 8px);padding-bottom:calc(64px + var(--safe-bottom) + 12px);
    min-height:100vh;}
  input,select,button,textarea{font-size:16px;font-family:inherit;} /* verhindert iOS-Zoom bei Fokus */

  header.top{position:sticky;top:0;z-index:5;background:var(--green);color:#fff;
    padding:calc(var(--safe-top) + 10px) 16px 12px;display:flex;align-items:center;justify-content:space-between;}
  header.top h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.2px;}
  header.top .sync-btn{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:10px;
    padding:8px 12px;font-size:13px;display:flex;align-items:center;gap:6px;}
  header.top .sync-dot{width:8px;height:8px;border-radius:50%;background:#8fd19e;}
  header.top .sync-dot.warn{background:var(--amber);}

  main{padding:12px 14px;max-width:640px;margin:0 auto;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:12px;}
  .card h2{font-size:15px;margin:0 0 10px;color:var(--green-dark);}
  .row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;
    border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .name{font-weight:600;font-size:15px;}
  .row .sub{color:var(--ink-soft);font-size:13px;margin-top:2px;}
  .amount{font-weight:700;font-size:16px;}
  .badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;}
  .badge.warn{background:var(--red-soft);color:var(--red);}
  .badge.ok{background:#e0ece3;color:var(--green-dark);}
  .badge.pending{background:var(--amber-soft);color:#8a5a12;}

  label{display:block;font-size:13px;color:var(--ink-soft);margin:10px 0 4px;}
  input[type=text],input[type=number],input[type=date],select,textarea{
    width:100%;padding:12px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);}
  textarea{resize:vertical;min-height:60px;}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
    padding:13px 16px;border-radius:12px;border:none;font-weight:700;font-size:15px;width:100%;
    min-height:48px;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-amber{background:var(--amber);color:#fff;}
  .btn-outline{background:transparent;border:1.5px solid var(--green);color:var(--green);}
  .btn-danger{background:var(--red);color:#fff;}
  .btn-sm{padding:9px 12px;font-size:13px;width:auto;min-height:40px;}
  .btn-row{display:flex;gap:8px;margin-top:10px;}
  .btn-row .btn{flex:1;}

  .searchbox{position:relative;}
  .search-results{position:absolute;left:0;right:0;top:100%;background:#fff;border:1px solid var(--line);
    border-top:none;border-radius:0 0 10px 10px;max-height:260px;overflow-y:auto;z-index:10;}
  .search-results div{padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px;}
  .search-results div small{display:block;color:var(--ink-soft);}

  nav.bottom{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);
    display:flex;padding-bottom:var(--safe-bottom);z-index:6;}
  nav.bottom button{flex:1;background:none;border:none;padding:10px 4px 8px;color:var(--ink-soft);
    font-size:11px;display:flex;flex-direction:column;align-items:center;gap:3px;}
  nav.bottom button.active{color:var(--green);font-weight:700;}
  nav.bottom .icon{font-size:20px;}

  .empty{text-align:center;color:var(--ink-soft);padding:24px 10px;font-size:14px;}
  .hidden{display:none !important;}
  .produkt-line{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;margin-bottom:8px;}
  .produkt-line .grow{flex:1 1 100%;min-width:160px;}
  .produkt-line .aufwand{width:110px;}
  .flaeche-check{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--line);}
  .flaeche-check:last-child{border-bottom:none;}
  .flaeche-check input{width:auto;}
  .result-box{background:var(--amber-soft);border-radius:10px;padding:12px;margin-top:10px;font-size:14px;}
  .result-box b{display:block;margin-bottom:4px;}
  .toast{position:fixed;bottom:calc(76px + var(--safe-bottom));left:16px;right:16px;background:var(--green-dark);
    color:#fff;padding:12px 16px;border-radius:12px;text-align:center;font-size:14px;z-index:20;
    opacity:0;transform:translateY(10px);transition:.25s;pointer-events:none;}
  .toast.show{opacity:1;transform:translateY(0);}
  .detail-field{margin-bottom:10px;}
  .detail-field .k{font-size:12px;color:var(--ink-soft);}
  .detail-field .v{font-size:14px;}
  .back-link{color:var(--green);font-size:14px;margin-bottom:10px;display:inline-block;}
</style>
</head>
<body>

<header class="top">
  <h1>🌾 PSM-Bestandsbuch</h1>
  <button class="sync-btn" id="syncBtn"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">Sync</span></button>
</header>

<main id="main"></main>

<nav class="bottom">
  <button data-view="start" class="active"><span class="icon">📦</span>Bestand</button>
  <button data-view="buchen"><span class="icon">✍️</span>Buchen</button>
  <button data-view="flaechen"><span class="icon">🗺️</span>Flächen</button>
  <button data-view="massnahmen"><span class="icon">🚜</span>Maßnahmen</button>
</nav>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   KONFIGURATION – hier die Web-App-URL deines Apps Scripts eintragen
   ============================================================ */
const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyM9cTcewhFnXRuwF2dVtUXaglPnnEyPd1khHX9WH0qFcYxLpo_CKEOZuU0XCUxd6m6/exec';
const SYNC_INTERVAL_MS = 22000;
const KULTUREN = ['Gerste', 'Weizen', 'Roggen', 'Triticale', 'Raps', 'Mais', 'Kartoffeln', 'Lupinen', 'Erbsen', 'Ackerbohnen', 'Grünland'];
const EINHEITEN = ['l', 'ml', 'kg', 'g'];

/** Rät anhand des BVL-Katalogtexts eine Standard-Einheit (l/ml/kg/g), Fallback 'l'. */
function rateEinheitAusKatalog(kennr){
  const katalog = katalogEintrag(kennr);
  const text = katalog.map(k => (k.aufwand_einheit || '')).join(' ').toLowerCase();
  if (text.includes('ml')) return 'ml';
  if (text.includes('kg')) return 'kg';
  if (text.includes('g') && !text.includes('kg')) return 'g';
  if (text.includes('l')) return 'l';
  return 'l';
}

/* ============================================================
   STATE
   ============================================================ */
let state = {
  flaechen: [],
  buchungen: [],
  massnahmen: [],
  katalog: [],
  katalogLoaded: false,
  letzterSync: null,
  view: 'start'
};
let userIsTyping = false; // verhindert Überschreiben laufender Eingaben durch Hintergrund-Sync
let massnahmenToggleInFlight = 0; // verhindert, dass ein Sync mitten in einem Checkbox-Toggle die alten Daten zurückschreibt
let massnahmeDraft = { produkte: [], flaechenIds: [], wasser_ha: '', tank_max: '', ergebnisHtml: '' };
let flaecheEditId = null;
let buchungEditId = null;
let massnahmeEditId = null;
let bestandKulturFilter = '';
let einbuchenDraft = { suche: '', kennr: '', handelsname: '', menge: '', einheit: 'l', datum: '', charge: '', person: '', manuell: false, manuellName: '' };
let ausbuchenDraft = { kennr: '', charge: '', menge: '', datum: '', person: '', kommentar: '' };

/* ============================================================
   ROBUSTE FETCH-HELFER
   ============================================================ */
async function apiGet(action){
  const url = APP_SCRIPT_URL + (APP_SCRIPT_URL.includes('?') ? '&' : '?') + 'action=' + action;
  for (let attempt = 0; attempt < 4; attempt++){
    try{
      const res = await fetch(url, { method:'GET' });
      const data = await res.json();
      if (data.ok) return data;
      throw new Error(data.error || 'Unbekannter Serverfehler');
    }catch(err){
      if (attempt === 3) throw err;
      await sleep(500 * Math.pow(2, attempt));
    }
  }
}

async function apiPost(action, payload){
  const body = JSON.stringify(Object.assign({ action }, payload));
  for (let attempt = 0; attempt < 4; attempt++){
    try{
      const res = await fetch(APP_SCRIPT_URL, {
        method:'POST',
        headers:{ 'Content-Type':'text/plain' }, // vermeidet CORS-Preflight bei Apps Script
        body
      });
      const data = await res.json();
      if (data.ok) return data.result;
      throw new Error(data.error || 'Unbekannter Serverfehler');
    }catch(err){
      if (attempt === 3) throw err;
      await sleep(500 * Math.pow(2, attempt));
    }
  }
}

function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }

/* ============================================================
   SYNC
   ============================================================ */
async function syncOperativeData(showToast, isPeriodic){
  setSyncStatus('lädt');
  try{
    const data = await apiGet('data');
    state.flaechen = data.flaechen || [];
    state.buchungen = data.buchungen || [];
    state.massnahmen = (data.massnahmen || []).map(m => {
      try { m.produkte = typeof m.produkte === 'string' ? JSON.parse(m.produkte) : (m.produkte_json ? JSON.parse(m.produkte_json) : []); } catch(e){ m.produkte = m.produkte || []; }
      try { m.flaechen = typeof m.flaechen === 'string' ? JSON.parse(m.flaechen) : (m.flaechen_json ? JSON.parse(m.flaechen_json) : []); } catch(e){ m.flaechen = m.flaechen || []; }
      return m;
    });
    state.letzterSync = data.letzterSync;
    setSyncStatus('ok');
    // Der automatische Hintergrund-Sync (alle 22s) zeichnet die Seite NICHT neu, damit
    // laufende Eingaben in irgendeinem Feld nie überschrieben werden können – egal wo.
    // Die frischen Daten stehen trotzdem sofort bereit, sobald als Nächstes durch eine
    // echte Nutzeraktion (Klick, Tab-Wechsel, manueller Sync-Button) neu gezeichnet wird.
    if (!isPeriodic) render();
    if (showToast) toast('Aktualisiert');
  }catch(err){
    setSyncStatus('fehler');
    if (showToast) toast('Sync fehlgeschlagen: ' + err.message);
    // WICHTIG: bei Fehler bleiben die zuletzt bekannten Daten unverändert (kein leeres Überschreiben)
  }
}


async function loadKatalogOnce(){
  if (state.katalogLoaded) return;
  try{
    const data = await apiGet('katalog');
    state.katalog = data.katalog || [];
    state.katalogLoaded = true;
    render();
  }catch(err){
    toast('PSM-Katalog konnte nicht geladen werden: ' + err.message);
  }
}

function setSyncStatus(status){
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  if (status === 'ok'){ dot.className = 'sync-dot'; label.textContent = 'Sync'; }
  else if (status === 'lädt'){ dot.className = 'sync-dot warn'; label.textContent = '…'; }
  else { dot.className = 'sync-dot warn'; label.textContent = 'Fehler'; }
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2600);
}

/* ============================================================
   BESTANDSBERECHNUNG (aus Buchungen)
   ============================================================ */
function berechneBestand(alleAnzeigen){
  const map = {}; // kennr -> {handelsname, gesamt, einheit, chargen:{charge:menge}}
  state.buchungen.forEach(b => {
    if (!map[b.kennr]) map[b.kennr] = { kennr:b.kennr, handelsname:b.handelsname, gesamt:0, einheit:'', chargen:{} };
    const vz = b.typ === 'Ausbuchung' ? -1 : 1;
    const menge = parseFloat(b.menge) || 0;
    map[b.kennr].gesamt += vz * menge;
    if (b.einheit) map[b.kennr].einheit = b.einheit; // jeweils letzte bekannte Einheit
    const charge = b.charge || '(ohne Charge)';
    map[b.kennr].chargen[charge] = (map[b.kennr].chargen[charge] || 0) + vz * menge;
  });
  if (alleAnzeigen) return Object.values(map); // auch Produkte mit 0 Bestand (schon mal eingebucht, aktuell leer)
  return Object.values(map).filter(p => Math.abs(p.gesamt) > 0.0001);
}

function katalogEintrag(kennr){
  return state.katalog.filter(k => k.kennr === kennr);
}

function istAbgelaufen(zulEnde){
  if (!zulEnde) return false;
  const d = new Date(zulEnde);
  return d.getTime() < Date.now();
}

/* ============================================================
   RENDER: ROUTER
   ============================================================ */
function render(){
  const main = document.getElementById('main');
  if (state.view === 'start') main.innerHTML = renderStart();
  else if (state.view === 'buchen') main.innerHTML = renderBuchen();
  else if (state.view === 'flaechen') main.innerHTML = renderFlaechen();
  else if (state.view === 'massnahmen') main.innerHTML = renderMassnahmen();
  else if (state.view === 'produkt') main.innerHTML = renderProduktDetail(state.detailKennr);
  else if (state.view === 'massnahmePlanen') main.innerHTML = renderMassnahmePlanen();
  else if (state.view === 'massnahmeErledigen') main.innerHTML = renderMassnahmeErledigen(state.detailMassnahmeId);

  attachHandlers();
}

/* ---------- START: Bestandsübersicht ---------- */
function renderStart(){
  const bestand = berechneBestand(true);
  if (bestand.length === 0){
    return `<div class="card"><div class="empty">Noch kein Bestand erfasst.<br>Nutze unten „Buchen“, um PSM einzubuchen.</div></div>`;
  }

  // Jedem Bestandsprodukt seine Kultur(en) aus dem Katalog anhängen
  bestand.forEach(p => {
    const katalog = katalogEintrag(p.kennr);
    p._kulturen = [...new Set(katalog.map(k => k.kultur_name).filter(Boolean))];
  });

  const alleKulturen = [...new Set(bestand.flatMap(p => p._kulturen))].sort((a,b) => a.localeCompare(b, 'de'));

  const gefiltert = bestandKulturFilter
    ? bestand.filter(p => p._kulturen.includes(bestandKulturFilter))
    : bestand;

  const sortiert = gefiltert.slice().sort((a,b) => a.handelsname.localeCompare(b.handelsname, 'de'));

  const filterHtml = alleKulturen.length ? `
    <div class="card">
      <label>Nach Kultur filtern</label>
      <select id="bestandKulturFilter">
        <option value="">Alle Kulturen</option>
        ${alleKulturen.map(k => `<option value="${escapeHtml(k)}" ${bestandKulturFilter === k ? 'selected' : ''}>${escapeHtml(k)}</option>`).join('')}
      </select>
    </div>
  ` : '';

  const rows = sortiert.map(p => {
    const katalog = katalogEintrag(p.kennr);
    const kulturen = p._kulturen.join(', ') || '–';
    const wirkstoffe = [...new Set(katalog.map(k => k.wirkstoffe).filter(Boolean))].join(', ');
    const abgelaufen = katalog.some(k => istAbgelaufen(k.zul_ende));
    const leer = Math.abs(p.gesamt) <= 0.0001;
    return `
      <div class="row" data-open-produkt="${p.kennr}" ${leer ? 'style="opacity:.55"' : ''}>
        <div>
          <div class="name">${escapeHtml(p.handelsname || p.kennr)}</div>
          <div class="sub">${escapeHtml(kulturen)}</div>
          ${wirkstoffe ? `<div class="sub" style="color:var(--red)">${escapeHtml(wirkstoffe)}</div>` : ''}
        </div>
        <div style="text-align:right">
          <div class="amount">${leer ? 'nicht auf Lager' : formatZahl(p.gesamt) + ' ' + escapeHtml(p.einheit || '')}</div>
          ${abgelaufen ? '<span class="badge warn">Zulassung abgelaufen</span>' : ''}
        </div>
      </div>`;
  }).join('') || '<div class="empty">Kein Bestand für diese Kultur.</div>';

  return `${filterHtml}<div class="card"><h2>Aktueller Lagerbestand</h2>${rows}</div>`;
}

/* ---------- PRODUKTDETAIL ---------- */
function renderProduktDetail(kennr){
  const katalog = katalogEintrag(kennr);
  const istManuell = kennr.startsWith('MANUELL:');
  const bestand = berechneBestand().find(p => p.kennr === kennr);
  const chargen = bestand ? Object.entries(bestand.chargen).filter(([,m]) => Math.abs(m) > 0.0001) : [];
  const produktname = katalog.length ? katalog[0].handelsname : (bestand ? bestand.handelsname : kennr);

  const kulturBloecke = katalog.length ? katalog.map(k => `
    <div class="card">
      <h2>${escapeHtml(k.kultur_name)}</h2>
      ${detailFeld('Zulassungsnummer', k.kennr)}
      ${detailFeld('Wirkstoffe', k.wirkstoffe)}
      ${detailFeld('Schaderreger', k.schaderreger)}
      ${detailFeld('Aufwandmenge', (k.aufwandmenge || '–') + ' ' + (k.aufwand_einheit || ''))}
      ${detailFeld('Wassermenge', (k.wasser_von || '') + (k.wasser_bis && k.wasser_bis != k.wasser_von ? '–' + k.wasser_bis : '') + ' ' + (k.wasser_einheit || ''))}
      ${detailFeld('Auflagen', k.auflagen || '–')}
      ${detailFeld('Zulassungsbeginn', formatDatum(k.zul_beginn))}
      ${detailFeld('Zulassungsende', formatDatum(k.zul_ende) + (istAbgelaufen(k.zul_ende) ? ' ⚠️ abgelaufen' : ''))}
    </div>
  `).join('') : (istManuell
    ? `<div class="card"><div class="empty">Manuell erfasstes Produkt – kein Pflanzenschutzmittel aus dem BVL-Katalog, daher keine Zulassungsdaten.</div></div>`
    : `<div class="card"><div class="empty">Keine Zulassungsdaten gefunden. Katalog evtl. noch nicht synchronisiert.</div></div>`);

  const buchungenListe = state.buchungen
    .filter(b => b.kennr === kennr)
    .slice()
    .sort((a,b) => (b.zeitstempel || '').localeCompare(a.zeitstempel || ''));

  const buchungEditing = buchungEditId ? buchungenListe.find(b => String(b.id) === String(buchungEditId)) : null;

  const buchungenRows = buchungenListe.map(b => {
    let herkunft = '';
    if (b.typ === 'Ausbuchung'){
      if (b.massnahme_id){
        const m = state.massnahmen.find(x => x.id === b.massnahme_id);
        const flaechenNamen = m ? (m.flaechen || []).map(fid => {
          const f = state.flaechen.find(x => x.id === fid);
          return f ? f.name : '?';
        }).join(', ') : '';
        herkunft = `Maßnahme${flaechenNamen ? ': ' + flaechenNamen : ''}`;
      } else {
        herkunft = 'Manuelle Ausbuchung';
      }
    }
    return `
    <div class="row">
      <div>
        <div class="name">${b.typ === 'Ausbuchung' ? '−' : '+'}${formatZahl(b.menge)} ${escapeHtml(b.einheit || '')}</div>
        <div class="sub">${formatDatum(b.datum)} · Charge ${escapeHtml(b.charge || '–')} · ${escapeHtml(b.person || '–')}</div>
        ${herkunft ? `<div class="sub">${escapeHtml(herkunft)}</div>` : ''}
        ${b.kommentar ? `<div class="sub">${escapeHtml(b.kommentar)}</div>` : ''}
      </div>
      <div class="btn-row" style="margin-top:0">
        <button class="btn btn-sm btn-outline" data-edit-buchung="${b.id}">Bearbeiten</button>
        <button class="btn btn-sm btn-danger" data-delete-buchung="${b.id}">Löschen</button>
      </div>
    </div>
  `;
  }).join('') || '<div class="empty">Keine Buchungen für dieses Produkt.</div>';

  const buchungEditForm = buchungEditing ? `
    <div class="card" style="background:#faf9f5">
      <h2>Buchung bearbeiten</h2>
      <label>Typ</label>
      <select id="beTyp">
        <option value="Einbuchung" ${buchungEditing.typ === 'Einbuchung' ? 'selected' : ''}>Einbuchung</option>
        <option value="Ausbuchung" ${buchungEditing.typ === 'Ausbuchung' ? 'selected' : ''}>Ausbuchung</option>
      </select>
      <label>Menge</label>
      <input type="number" id="beMenge" step="0.01" value="${buchungEditing.menge}">
      <label>Einheit</label>
      <input type="text" id="beEinheit" value="${escapeHtml(buchungEditing.einheit || '')}">
      <label>Datum</label>
      <input type="date" id="beDatum" value="${(buchungEditing.datum || '').slice(0,10)}">
      <label>Chargennummer</label>
      <input type="text" id="beCharge" value="${escapeHtml(buchungEditing.charge || '')}">
      <label>Person</label>
      <input type="text" id="bePerson" value="${escapeHtml(buchungEditing.person || '')}">
      <label>Kommentar / Grund</label>
      <input type="text" id="beKommentar" value="${escapeHtml(buchungEditing.kommentar || '')}">
      <div class="btn-row">
        <button class="btn btn-primary" id="beSpeichern" data-id="${buchungEditing.id}">Änderungen speichern</button>
        <button class="btn btn-outline" id="beAbbrechen">Abbrechen</button>
      </div>
    </div>
  ` : '';

  return `
    <a class="back-link" data-view-link="start">← Zurück zum Bestand</a>
    <div class="card">
      <h2>${escapeHtml(produktname)}</h2>
      ${detailFeld('Aktueller Bestand', bestand ? formatZahl(bestand.gesamt) + ' ' + (bestand.einheit || '') : '0')}
      ${chargen.length ? `<div class="detail-field"><div class="k">Nach Charge</div>` +
        chargen.map(([c,m]) => `<div class="v">${escapeHtml(c)}: ${formatZahl(m)} ${escapeHtml(bestand.einheit || '')}</div>`).join('') + `</div>` : ''}
    </div>
    <div class="card"><h2>Buchungshistorie</h2>${buchungenRows}</div>
    ${buchungEditForm}
    ${kulturBloecke}
  `;
}

function detailFeld(label, wert){
  return `<div class="detail-field"><div class="k">${escapeHtml(label)}</div><div class="v">${escapeHtml(String(wert || '–'))}</div></div>`;
}

/* ---------- BUCHEN ---------- */

  if (!ausbuchenDraft.datum) ausbuchenDraft.datum = heute();

          <select id="einManuellAuswahl">
            <option value="">– neues Produkt eintragen –</option>
            ${manuelleProdukteListe().map(p => `<option value="${escapeHtml(p.handelsname)}">${escapeHtml(p.handelsname)}</option>`).join('')}
          </select>
        ` : ''}
        <label>Produktname</label>
        <input type="text" id="einManuellName" placeholder="z.B. Universaldünger 20-20-20" value="${escapeHtml(einbuchenDraft.manuellName)}">
      ` : `
        <label>PSM auswählen</label>
        <div class="searchbox">
          <input type="text" id="einSuche" placeholder="Produktname suchen…" autocomplete="off" value="${escapeHtml(einbuchenDraft.suche)}">
          <div class="search-results hidden" id="einErgebnisse"></div>

      <label>Einheit</label>

        <option ${einbuchenDraft.einheit === 'l' ? 'selected' : ''}>l</option>
        <option ${einbuchenDraft.einheit === 'kg' ? 'selected' : ''}>kg</option>
        <option ${einbuchenDraft.einheit === 'Stück' ? 'selected' : ''}>Stück</option>

      <label>Datum</label>

      <label>Chargennummer</label>

      <label>Person</label>
      <input type="text" id="einPerson" placeholder="Dein Name" value="${escapeHtml(einbuchenDraft.person)}">
      <div class="btn-row"><button class="btn btn-primary" id="einSpeichern">Einbuchen</button></div>
    </div>

    <div class="card">
      <h2>Ausbuchen (Verbrauch)</h2>
      <label>Produkt aus Lagerbestand</label>
      <select id="ausProdukt">
        <option value="">– wählen –</option>${bestandOptionen()}
      </select>
      <label>Charge</label>
      <select id="ausCharge">${ausbuchenDraft.kennr ? ausChargenOptionenHtml(ausbuchenDraft.kennr, ausbuchenDraft.charge) : '<option value="">– zuerst Produkt wählen –</option>'}</select>
      <label>Menge</label>
      <input type="number" id="ausMenge" step="0.01" value="${ausbuchenDraft.menge}">
      <label>Datum</label>
      <input type="date" id="ausDatum" value="${ausbuchenDraft.datum}">
      <label>Person</label>
      <input type="text" id="ausPerson" placeholder="Dein Name" value="${escapeHtml(ausbuchenDraft.person)}">
      <label>Kommentar / Grund (optional)</label>

function bestandOptionen(){
  const bestand = berechneBestand();
  return bestand.map(p => `<option value="${p.kennr}" ${ausbuchenDraft.kennr === p.kennr ? 'selected' : ''}>${escapeHtml(p.handelsname)} (${formatZahl(p.gesamt)} ${escapeHtml(p.einheit || '')})</option>`).join('');
}

/** Bestand alphabetisch sortiert, für Dropdown-Auswahl bei der Maßnahmenplanung. */
function bestandFuerAuswahl(){
  return berechneBestand().slice().sort((a,b) => a.handelsname.localeCompare(b.handelsname, 'de'));
}

/* ---------- FLÄCHEN ---------- */
function renderFlaechen(){
  const rows = state.flaechen.map(f => `
    <div class="row" style="flex-wrap:wrap;align-items:flex-start">
      <div style="flex:1 1 100%;margin-bottom:8px">
        <div class="name">${escapeHtml(f.name)}</div>
        <div class="sub">${formatZahl(f.groesse_ha)} ha</div>
      </div>
      <div style="flex:1;min-width:150px">
        <select data-inline-kultur="${f.id}">

      </div>
      <div class="btn-row" style="margin-top:0;flex:0 0 auto">
        <button class="btn btn-sm btn-outline" data-edit-flaeche="${f.id}">Bearbeiten</button>
        <button class="btn btn-sm btn-danger" data-delete-flaeche="${f.id}">Löschen</button>
      </div>
    </div>
  `).join('') || '<div class="empty">Noch keine Flächen angelegt.</div>';

  const editing = flaecheEditId ? state.flaechen.find(f => f.id === flaecheEditId) : null;
  const kulturOptionen = KULTUREN.map(k =>

      <input type="number" id="flGroesse" step="0.01" value="${editing ? editing.groesse_ha : ''}">
      <label>Kultur (aktuell angebaut)</label>
      <select id="flKultur">
        <option value="" ${editing && !editing.kultur ? 'selected' : ''}>– keine Angabe –</option>
        ${kulturOptionen}
      </select>
      <div class="btn-row">
        <button class="btn btn-primary" id="flSpeichern">${editing ? 'Änderungen speichern' : 'Fläche anlegen'}</button>
        ${editing ? '<button class="btn btn-outline" id="flAbbrechen">Abbrechen</button>' : ''}
      </div>

}

/* ---------- MASSNAHMEN: LISTE ---------- */
function renderMassnahmen(){
  const offene = state.massnahmen.filter(m => m.status !== 'bestaetigt');
  const rows = offene.map(m => {
    const produkte = (m.produkte || []).map(p => p.handelsname).join(', ');
    const flaechenNamen = (m.flaechen || []).map(id => {
      const f = state.flaechen.find(x => x.id === id);
      return f ? f.name : '?';
    }).join(', ');
    let badge = '<span class="badge pending">geplant</span>';
    if (m.status === 'erledigt') badge = '<span class="badge ok">erledigt – zu bestätigen</span>';
    const bearbeitenBtn = m.status === 'geplant'
      ? `<button class="btn btn-sm btn-outline" data-edit-massnahme="${m.id}" style="margin-top:6px">Bearbeiten</button>
         <button class="btn btn-sm btn-danger" data-delete-massnahme="${m.id}" style="margin-top:6px">Löschen</button>` : '';
    return `
      <div class="row">
        <div data-open-massnahme="${m.id}" style="flex:1;cursor:pointer">
          <div class="name">${escapeHtml(produkte || 'Maßnahme')}</div>
          <div class="sub">${escapeHtml(flaechenNamen)}</div>
        </div>
        <div style="text-align:right">${badge}<br>${bearbeitenBtn}</div>
      </div>`;
  }).join('') || '<div class="empty">Keine offenen Maßnahmen.</div>';

  const hatUnfertigeNeuePlanung = !massnahmeEditId &&
    (massnahmeDraft.produkte.length > 0 || massnahmeDraft.flaechenIds.length > 0);

  return `
    <div class="card"><h2>Offene Maßnahmen</h2>${rows}</div>
    ${hatUnfertigeNeuePlanung ? `
      <div class="card" style="background:var(--amber-soft)">
        <h2>Ungespeicherte Planung</h2>
        <div class="sub">Du hast eine begonnene, noch nicht gespeicherte Maßnahmenplanung.</div>
        <div class="btn-row">
          <button class="btn btn-primary" id="planungFortsetzen">Weiter planen</button>
          <button class="btn btn-outline" id="planungVerwerfen">Verwerfen</button>
        </div>
      </div>
    ` : ''}
    <div class="card">
      <button class="btn btn-primary" id="neueMassnahme">+ Neue Maßnahme planen</button>
    </div>
  `;
}

/* ---------- MASSNAHME PLANEN ---------- */
/** Fügt ein Produkt (aus Bestand-Dropdown oder Suche) der aktuellen Maßnahmenplanung hinzu, falls noch nicht enthalten. */
function produktZuMassnahmeHinzufuegen(kennr, handelsname){
  if (massnahmeDraft.produkte.find(p => p.kennr === kennr)) return;
  massnahmeDraft.produkte.push({ kennr, handelsname, aufwand_pro_ha: '', einheit: rateEinheitAusKatalog(kennr) });
  render();
}

function renderMassnahmePlanen(){
  const bestandAktuell = berechneBestand();
  const produktZeilen = massnahmeDraft.produkte.map((p, i) => {
    const katalog = katalogEintrag(p.kennr);
    const maxWerte = [...new Set(katalog
      .filter(k => k.aufwandmenge)
      .map(k => `${k.kultur_name}: max. ${k.aufwandmenge} ${k.aufwand_einheit || ''}`.trim()))];
    const einheitOptionen = EINHEITEN.map(e => `<option value="${e}" ${p.einheit === e ? 'selected' : ''}>${e}</option>`).join('');
    const bestandProdukt = bestandAktuell.find(b => b.kennr === p.kennr);
    const bestandText = bestandProdukt ? `${formatZahl(bestandProdukt.gesamt)} im Bestand` : '0 im Bestand';
    return `
    <div class="produkt-line">
      <div class="grow">
        <input type="text" value="${escapeHtml(p.handelsname)}" readonly>
      </div>
      <div class="aufwand">
        <input type="number" step="0.01" placeholder="Aufwand/ha" value="${p.aufwand_pro_ha || ''}" data-aufwand-index="${i}">
      </div>
      <div style="width:80px">
        <select data-einheit-index="${i}">${einheitOptionen}</select>
      </div>
      <button class="btn btn-sm btn-danger" data-remove-produkt="${i}">✕</button>
    </div>
    <div class="sub" style="margin:-4px 0 4px">${escapeHtml(bestandText)}</div>
    ${maxWerte.length ? `<div class="sub" style="margin:-4px 0 8px">Zulässig: ${escapeHtml(maxWerte.join(' · '))}</div>` : ''}
  `;
  }).join('') || '<div class="empty">Noch keine Produkte hinzugefügt.</div>';

  const flaechenCheckboxen = state.flaechen.map(f => `
    <div class="flaeche-check">
      <input type="checkbox" id="fl_${f.id}" value="${f.id}" ${massnahmeDraft.flaechenIds.includes(f.id) ? 'checked' : ''}>
      <label for="fl_${f.id}" style="margin:0">${escapeHtml(f.name)} (${formatZahl(f.groesse_ha)} ha${f.kultur ? ' · ' + escapeHtml(f.kultur) : ''})</label>
    </div>
  `).join('') || '<div class="empty">Erst Flächen anlegen.</div>';

  const vorhandeneKulturen = [...new Set(state.flaechen.map(f => f.kultur).filter(Boolean))];
  const kulturCheckboxen = vorhandeneKulturen.map(k => {
    const idsFuerKultur = state.flaechen.filter(f => f.kultur === k).map(f => f.id);
    const alleAusgewaehlt = idsFuerKultur.length > 0 && idsFuerKultur.every(id => massnahmeDraft.flaechenIds.includes(id));
    return `
      <div class="flaeche-check">
        <input type="checkbox" id="kult_${k}" data-kultur-check="${escapeHtml(k)}" ${alleAusgewaehlt ? 'checked' : ''}>
        <label for="kult_${k}" style="margin:0">Alle "${escapeHtml(k)}"-Flächen</label>
      </div>`;
  }).join('');

  const flaechenGesamtAuswahl = massnahmeDraft.flaechenIds.reduce((sum, id) => {
    const f = state.flaechen.find(x => x.id === id);
    return sum + (f ? parseFloat(f.groesse_ha) || 0 : 0);
  }, 0);

  return `
    <a class="back-link" data-view-link="massnahmen">← Zurück</a>
    <div class="card">
      <h2>Produkte hinzufügen</h2>
      <label>Aus Lagerbestand wählen</label>
      <select id="mnBestandAuswahl">
        <option value="">– Mittel aus Bestand wählen –</option>
        ${bestandFuerAuswahl().map(p => `<option value="${p.kennr}">${escapeHtml(p.handelsname)} (${formatZahl(p.gesamt)} ${escapeHtml(p.einheit || '')})</option>`).join('')}
      </select>
      <label style="margin-top:12px">Oder manuell suchen (auch Mittel außerhalb des Bestands)</label>
      <div class="searchbox">
        <input type="text" id="mnSuche" placeholder="Produktname suchen…" autocomplete="off">
        <div class="search-results hidden" id="mnErgebnisse"></div>
      </div>
      ${produktZeilen}
    </div>
    <div class="card">
      <h2 style="display:flex;justify-content:space-between;align-items:center">
        <span>Flächen auswählen</span>
        <span class="sub" style="margin:0">${formatZahl(flaechenGesamtAuswahl)} ha ausgewählt</span>
      </h2>
      ${vorhandeneKulturen.length ? `
        <label>Nach Kultur auswählen/abwählen</label>
        ${kulturCheckboxen}
        <div style="border-bottom:1px solid var(--line);margin:10px 0"></div>
      ` : ''}
      ${flaechenCheckboxen}
    </div>
    <div class="card">
      <h2>Spritzplanung</h2>
      <label>Wassermenge (l/ha)</label>
      <input type="number" id="mnWasser" step="1" placeholder="z.B. 200" value="${massnahmeDraft.wasser_ha}">
      <label>Maximales Tankvolumen (l)</label>
      <input type="number" id="mnTank" step="1" placeholder="z.B. 3000" value="${massnahmeDraft.tank_max}">
      <button class="btn btn-outline" id="mnBerechnen" style="margin-top:10px">Berechnen</button>
      <div id="mnErgebnis">${massnahmeDraft.ergebnisHtml || ''}</div>
    </div>
    <div class="card">
      <button class="btn btn-primary" id="mnSpeichern">${massnahmeEditId ? 'Änderungen speichern' : 'Maßnahme speichern'}</button>
    </div>
  `;
}

/* ---------- MASSNAHME ERLEDIGEN / DETAIL ---------- */
function renderMassnahmeErledigen(id){
  const m = state.massnahmen.find(x => x.id === id);
  if (!m) return `<a class="back-link" data-view-link="massnahmen">← Zurück</a><div class="card"><div class="empty">Maßnahme nicht gefunden.</div></div>`;

  const flaechenNamen = (m.flaechen || []).map(fid => {
    const f = state.flaechen.find(x => x.id === fid);
    return f ? `${f.name} (${formatZahl(f.groesse_ha)} ha)` : '?';
  }).join(', ');

  const flaechenGesamt = (m.flaechen || []).reduce((sum, fid) => {
    const f = state.flaechen.find(x => x.id === fid);
    return sum + (f ? parseFloat(f.groesse_ha) || 0 : 0);
  }, 0);

  const produktZeilen = (m.produkte || []).map((p, i) => {
    const benoetigteMenge = (parseFloat(p.aufwand_pro_ha) || 0) * flaechenGesamt;
    const bestand = berechneBestand().find(b => b.kennr === p.kennr);
    const chargenEntries = bestand ? Object.entries(bestand.chargen).filter(([,menge]) => Math.abs(menge) > 0.0001) : [];
    const nichtGenug = !bestand || bestand.gesamt < benoetigteMenge;
    const chargenOptionen = chargenEntries
      .map(([c, menge]) => `<option value="${escapeHtml(c)}">${escapeHtml(c)} (${formatZahl(menge)} ${escapeHtml(bestand.einheit || '')} verfügbar)</option>`).join('');
    // Bei genau einer verfügbaren Charge (auch "(ohne Charge)") automatisch vorauswählen,
    // statt eine manuelle Auswahl zu erzwingen. Bei mehreren Chargen muss bewusst gewählt werden.
    const selectHtml = chargenEntries.length === 1
      ? `<select data-erledigen-charge="${i}" data-kennr="${p.kennr}" data-handelsname="${escapeHtml(p.handelsname)}" data-benoetigt="${benoetigteMenge}" data-einheit="${escapeHtml(p.einheit || '')}">${chargenOptionen}</select>`
      : `<select data-erledigen-charge="${i}" data-kennr="${p.kennr}" data-handelsname="${escapeHtml(p.handelsname)}" data-benoetigt="${benoetigteMenge}" data-einheit="${escapeHtml(p.einheit || '')}">
           <option value="">– wählen –</option>${chargenOptionen}
         </select>`;
    return `
      <div class="card" style="background:#faf9f5">
        <div class="name">${escapeHtml(p.handelsname)}</div>
        <div class="sub">Benötigt: ${formatZahl(benoetigteMenge)} ${escapeHtml(p.einheit || '')}</div>
        ${nichtGenug ? '<div class="badge warn">Bestand reicht nicht aus!</div>' : ''}
        <label>Charge${chargenEntries.length === 1 ? '' : ' wählen'}</label>
        ${selectHtml}
      </div>
    `;
  }).join('');

  const tankfuellungenHtml = m.status === 'geplant'
    ? berechneTankfuellungenInteraktivHtml(m, m.produkte || [], flaechenGesamt, parseFloat(m.wasser_ha), parseFloat(m.tank_max))
    : berechneTankfuellungenHtml(m.produkte || [], flaechenGesamt, parseFloat(m.wasser_ha), parseFloat(m.tank_max));

  const flaechenErledigt = m.flaechenErledigt || [];
  const flaechenChecklisteHtml = (m.flaechen || []).map(fid => {
    const f = state.flaechen.find(x => x.id === fid);
    const istErledigt = flaechenErledigt.includes(fid);
    return `
      <div class="row">
        <label style="display:flex;align-items:center;gap:8px;margin:0;flex:1">
          <input type="checkbox" data-flaeche-check="${fid}" data-massnahme-id="${m.id}" ${istErledigt ? 'checked' : ''} style="width:20px;height:20px">
          <span>${f ? escapeHtml(f.name) + ' (' + formatZahl(f.groesse_ha) + ' ha)' : '?'}</span>
        </label>
        ${istErledigt ? '<span class="badge ok">erledigt</span>' : ''}
      </div>`;
  }).join('') || '<div class="empty">Keine Flächen zugeordnet.</div>';

  if (m.status === 'geplant'){
    return `
      <a class="back-link" data-view-link="massnahmen">← Zurück</a>
      <div class="card">
        <h2>Maßnahme erledigen</h2>
      </div>
      <div class="card">
        <h2>Flächen</h2>
        ${flaechenChecklisteHtml}
      </div>
      <div class="card">
        <h2>Mischungen / Tankfüllungen</h2>
        ${tankfuellungenHtml}
      </div>
      ${produktZeilen}
      <div class="card">
        <label>Datum</label>
        <input type="date" id="erlDatum" value="${heute()}">
        <label>Person</label>
        <input type="text" id="erlPerson" placeholder="Dein Name">
        <div class="btn-row"><button class="btn btn-amber" id="erlSpeichern" data-massnahme-id="${m.id}">Als erledigt verbuchen</button></div>
      </div>
    `;
  }

  if (m.status === 'erledigt'){
    return `
      <a class="back-link" data-view-link="massnahmen">← Zurück</a>
      <div class="card">
        <h2>Maßnahme erledigt</h2>
        <div class="sub">Erledigt von ${escapeHtml(m.erledigt_von || '–')} am ${formatDatum(m.erledigt_am)}</div>
        <div class="sub">Flächen: ${escapeHtml(flaechenNamen)}</div>
      </div>
      <div class="card">
        <h2>Mischungen / Tankfüllungen</h2>
        ${tankfuellungenHtml}
      </div>
      <div class="card">
        <p style="font-size:14px">Sobald diese Maßnahme in der Ackerschlagdatei eingetragen wurde, hier bestätigen – sie verschwindet dann aus der App.</p>
        <label>Person (Bestätigung)</label>
        <input type="text" id="bestPerson" placeholder="Dein Name">
        <div class="btn-row"><button class="btn btn-primary" id="bestSpeichern" data-massnahme-id="${m.id}">In Ackerschlagdatei erledigt – bestätigen</button></div>
      </div>
    `;
  }

  return '';
}

/* ============================================================
   EVENT HANDLER
   ============================================================ */
function attachHandlers(){
  document.querySelectorAll('nav.bottom button').forEach(btn => {
    btn.onclick = () => { setView(btn.dataset.view); };
  });

  document.querySelectorAll('[data-view-link]').forEach(el => {
    el.onclick = (e) => { e.preventDefault(); setView(el.dataset.viewLink); };
  });

  document.querySelectorAll('[data-open-produkt]').forEach(el => {
    el.onclick = () => { state.detailKennr = el.dataset.openProdukt; setView('produkt'); };
  });

  const bestandKulturFilterEl = document.getElementById('bestandKulturFilter');
  if (bestandKulturFilterEl){
    bestandKulturFilterEl.onchange = () => { bestandKulturFilter = bestandKulturFilterEl.value; render(); };
  }

  document.querySelectorAll('[data-open-massnahme]').forEach(el => {
    el.onclick = () => { state.detailMassnahmeId = el.dataset.openMassnahme; setView('massnahmeErledigen'); };
  });

  document.querySelectorAll('[data-edit-massnahme]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const m = state.massnahmen.find(x => x.id === el.dataset.editMassnahme);
      if (!m) return;
      massnahmeEditId = m.id;
      massnahmeDraft = {

function bindTypingGuard(el){
  el.addEventListener('focus', () => { userIsTyping = true; });

function setView(view){

    loadKatalogOnce();
  }
  render();

function renderSuchergebnisse(query, containerId, onSelect, nurKennrs){
  const container = document.getElementById(containerId);
  if (!query || query.length < 2){ container.classList.add('hidden'); container.innerHTML=''; return; }
  const q = query.toLowerCase();
  const treffer = [];
  const seen = new Set();
  state.katalog.forEach(k => {
    if (nurKennrs && !nurKennrs.has(k.kennr)) return;
    if (k.handelsname && k.handelsname.toLowerCase().includes(q) && !seen.has(k.kennr)){
      seen.add(k.kennr);
      treffer.push(k);
    }
  });
  if (treffer.length === 0){
    container.innerHTML = `<div>${nurKennrs ? 'Kein Treffer im Lagerbestand.' : 'Keine Treffer im Katalog.'}</div>`;
    container.classList.remove('hidden');
    return;
  }
  const bestand = berechneBestand();
  container.innerHTML = treffer.slice(0, 20).map(k => {
    const b = bestand.find(p => p.kennr === k.kennr);
    const bestandText = b ? `${formatZahl(b.gesamt)} im Bestand` : '0 im Bestand';
    return `<div data-kennr="${k.kennr}">${escapeHtml(k.handelsname)}<small>${escapeHtml(k.kultur_name || '')} · ${escapeHtml(bestandText)}</small></div>`;
  }).join('');
  container.classList.remove('hidden');
  container.querySelectorAll('div[data-kennr]').forEach(el => {
    el.onclick = () => {
      const item = treffer.find(t => t.kennr === el.dataset.kennr);
      onSelect(item);
    };
  });
}

/** Erzeugt aus einem manuell eingegebenen Produktnamen einen stabilen Schlüssel,
 *  damit spätere Buchungen desselben Produkts im selben Bestand landen. */
function manuelleKennr(name){
  return 'MANUELL:' + name.trim().toLowerCase().replace(/\s+/g, ' ');
}

/** Alle bisher manuell erfassten Produkte (auch mit Bestand 0, für Nachbestellungen), dedupliziert. */
function manuelleProdukteListe(){
  const gesehen = new Set();
  const ergebnis = [];
  state.buchungen
    .filter(b => (b.kennr || '').startsWith('MANUELL:'))
    .forEach(b => {
      if (!gesehen.has(b.kennr)){
        gesehen.add(b.kennr);
        ergebnis.push({ kennr: b.kennr, handelsname: b.handelsname });
      }
    });
  return ergebnis.sort((a,b) => a.handelsname.localeCompare(b.handelsname, 'de'));
}

  const bestand = berechneBestand().find(p => p.kennr === kennr);

  const optionen = Object.entries(bestand.chargen)
    .filter(([,m]) => Math.abs(m) > 0.0001)

/** Berechnet die Tankfüllungen (inkl. Restfüllung) für eine Menge Produkte/Fläche/Wasser/Tank. */
/** Liefert nur die Liste der Wassermengen je Tankfüllung (inkl. Restfüllung), ohne HTML. */
function berechneFuellungenArray(flaechenGesamt, wasserProHa, tankMax){
  if (!wasserProHa || !tankMax || flaechenGesamt === 0) return { fuellungen: [], rest: 0, vollTanks: 0 };
  const wasserGesamt = wasserProHa * flaechenGesamt;
  const vollTanks = Math.floor(wasserGesamt / tankMax + 1e-9);
  const rest = wasserGesamt - vollTanks * tankMax;
  const fuellungen = [];
  for (let i = 0; i < vollTanks; i++) fuellungen.push(tankMax);
  if (rest > 0.01) fuellungen.push(rest);
  return { fuellungen, rest, vollTanks };
}

function berechneTankfuellungenHtml(produkte, flaechenGesamt, wasserProHa, tankMax){
  if (!wasserProHa || !tankMax || flaechenGesamt === 0 || produkte.length === 0){
    return '<div class="result-box">Keine vollständigen Angaben zur Spritzplanung vorhanden.</div>';
  }
  const wasserGesamt = wasserProHa * flaechenGesamt;
  const { fuellungen, rest, vollTanks } = berechneFuellungenArray(flaechenGesamt, wasserProHa, tankMax);

  const fuellungenHtml = fuellungen.map((wasserImTank, i) => {
    const haInDieserFuellung = wasserImTank / wasserProHa;
    const produktZeilen = produkte.map(p => {
      const aufwand = parseFloat(p.aufwand_pro_ha) || 0;
      const menge = aufwand * haInDieserFuellung;
      return `<div>${escapeHtml(p.handelsname)}: ${formatZahl(menge)} ${escapeHtml(p.einheit || '')} einmischen</div>`;
    }).join('');
    return `
      <div class="result-box" style="margin-top:${i === 0 ? '10' : '8'}px">
        <b>Tankfüllung ${i + 1}${i === fuellungen.length - 1 && rest > 0.01 && vollTanks > 0 ? ' (Rest)' : ''}: ${formatZahl(wasserImTank)} l Wasser (${formatZahl(haInDieserFuellung)} ha)</b>
        <div style="margin-top:6px">${produktZeilen}</div>
      </div>`;
  }).join('');

  return `
    <div class="result-box">
      <b>Gesamtfläche: ${formatZahl(flaechenGesamt)} ha</b>
      <div>Wasser gesamt: ${formatZahl(wasserGesamt)} l</div>
      <div>Anzahl Tankfüllungen: ${fuellungen.length}</div>
    </div>
    ${fuellungenHtml}
  `;
}

/** Wie berechneTankfuellungenHtml, aber mit Haken pro Tankfüllung zum Abhaken während der Ausbringung. */
function berechneTankfuellungenInteraktivHtml(m, produkte, flaechenGesamt, wasserProHa, tankMax){
  if (!wasserProHa || !tankMax || flaechenGesamt === 0 || produkte.length === 0){
    return '<div class="result-box">Keine vollständigen Angaben zur Spritzplanung vorhanden.</div>';
  }
  const wasserGesamt = wasserProHa * flaechenGesamt;
  const { fuellungen, rest, vollTanks } = berechneFuellungenArray(flaechenGesamt, wasserProHa, tankMax);
  const erledigt = m.tankfuellungenErledigt || [];

  const fuellungenHtml = fuellungen.map((wasserImTank, i) => {
    const haInDieserFuellung = wasserImTank / wasserProHa;
    const istErledigt = erledigt.includes(i);
    const produktZeilen = produkte.map(p => {
      const aufwand = parseFloat(p.aufwand_pro_ha) || 0;
      const menge = aufwand * haInDieserFuellung;
      return `<div>${escapeHtml(p.handelsname)}: ${formatZahl(menge)} ${escapeHtml(p.einheit || '')} einmischen</div>`;
    }).join('');
    return `
      <div class="result-box" style="margin-top:${i === 0 ? '10' : '8'}px">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px">
          <label style="display:flex;align-items:center;gap:8px;margin:0;flex:1">
            <input type="checkbox" data-tankfuellung-check="${i}" data-massnahme-id="${m.id}" ${istErledigt ? 'checked' : ''} style="width:20px;height:20px">
            <b>Tankfüllung ${i + 1}${i === fuellungen.length - 1 && rest > 0.01 && vollTanks > 0 ? ' (Rest)' : ''}: ${formatZahl(wasserImTank)} l Wasser (${formatZahl(haInDieserFuellung)} ha)</b>
          </label>
          ${istErledigt ? '<span class="badge ok">erledigt</span>' : ''}
        </div>
        <div style="margin-top:6px">${produktZeilen}</div>
      </div>`;
  }).join('');

  return `
    <div class="result-box">
      <b>Gesamtfläche: ${formatZahl(flaechenGesamt)} ha</b>
      <div>Wasser gesamt: ${formatZahl(wasserGesamt)} l</div>
      <div>Anzahl Tankfüllungen: ${fuellungen.length}</div>
    </div>
    ${fuellungenHtml}
  `;
}

function handleMassnahmeBerechnen(){
  const wasserProHa = parseFloat(document.getElementById('mnWasser').value);
  const tankMax = parseFloat(document.getElementById('mnTank').value);
  const flaechenGesamt = massnahmeDraft.flaechenIds.reduce((sum, id) => {
    const f = state.flaechen.find(x => x.id === id);
    return sum + (f ? parseFloat(f.groesse_ha) || 0 : 0);
  }, 0);

  massnahmeDraft.ergebnisHtml = berechneTankfuellungenHtml(massnahmeDraft.produkte, flaechenGesamt, wasserProHa, tankMax);
  render();
}

async function handleMassnahmeLoeschen(id){
  if (!confirm('Diese geplante Maßnahme wirklich löschen?')) return;
  try{
    await apiPost('deleteMassnahme', { id });
    toast('Maßnahme gelöscht.');
    if (massnahmeEditId === id) massnahmeEditId = null;
    await syncOperativeData(false);
  }catch(err){ toast('Fehler: ' + err.message); }
}

async function handleMassnahmeSpeichern(){
  if (massnahmeDraft.produkte.length === 0 || massnahmeDraft.flaechenIds.length === 0){
    toast('Bitte mindestens ein Produkt und eine Fläche wählen.'); return;
  }
  try{
    const payload = {
      produkte: massnahmeDraft.produkte,
      flaechenIds: massnahmeDraft.flaechenIds,
      wasser_ha: document.getElementById('mnWasser').value,
      tank_max: document.getElementById('mnTank').value
    };
    if (massnahmeEditId){
      await apiPost('updateMassnahme', Object.assign({ id: massnahmeEditId }, payload));
      toast('Maßnahme aktualisiert.');
    } else {
      await apiPost('addMassnahme', payload);
      toast('Maßnahme gespeichert.');
    }
    massnahmeEditId = null;
    massnahmeDraft = { produkte: [], flaechenIds: [], wasser_ha: '', tank_max: '', ergebnisHtml: '' };
    setView('massnahmen');
    await syncOperativeData(false);
  }catch(err){ toast('Fehler: ' + err.message); }
}

async function handleMassnahmeErledigen(e){
  const massnahmeId = e.target.dataset.massnahmeId;
  const m = state.massnahmen.find(x => x.id === massnahmeId);
  const flaechenGesamt = (m.flaechen || []).reduce((sum, id) => {
    const f = state.flaechen.find(x => x.id === id);
    return sum + (f ? parseFloat(f.groesse_ha) || 0 : 0);
  }, 0);

  const chargenAuswahl = [];
  let fehlt = false;
  document.querySelectorAll('[data-erledigen-charge]').forEach(sel => {
    const charge = sel.value;
    if (!charge) { fehlt = true; return; }
    const index = sel.dataset.erledigenCharge;
    const produkt = m.produkte[index];
    const menge = (parseFloat(produkt.aufwand_pro_ha) || 0) * flaechenGesamt;
    chargenAuswahl.push({
      kennr: sel.dataset.kennr,
      handelsname: sel.dataset.handelsname,
      charge,
      menge,
      einheit: sel.dataset.einheit || ''
    });
  });
  if (fehlt){ toast('Bitte für jedes Produkt eine Charge wählen.'); return; }

  const person = document.getElementById('erlPerson').value;
  const datum = document.getElementById('erlDatum').value;
  if (!person){ toast('Bitte Person angeben.'); return; }

  try{
    await apiPost('erledigeMassnahme', { massnahmeId, person, datum, chargenAuswahl });
    toast('Maßnahme erledigt – Bestand aktualisiert.');
    setView('massnahmen');
    await syncOperativeData(false);
  }catch(err){ toast('Fehler: ' + err.message); }
}

async function handleMassnahmeBestaetigen(e){
  const massnahmeId = e.target.dataset.massnahmeId;
  const person = document.getElementById('bestPerson').value;
  if (!person){ toast('Bitte Person angeben.'); return; }
  try{
    await apiPost('bestaetigeMassnahme', { massnahmeId, person, datum: heute() });
    toast('Bestätigt.');
    setView('massnahmen');
    await syncOperativeData(false);
  }catch(err){ toast('Fehler: ' + err.message); }
}

async function handleTankfuellungToggle(massnahmeId, index, erledigt){
  // Sofort lokal spiegeln, damit die Checkbox nicht "zurückspringt" während die Anfrage läuft
  const m = state.massnahmen.find(x => x.id === massnahmeId);
  if (m){
    const idx = Number(index);
    m.tankfuellungenErledigt = m.tankfuellungenErledigt || [];
    if (erledigt){
      if (!m.tankfuellungenErledigt.includes(idx)) m.tankfuellungenErledigt.push(idx);
    } else {
      m.tankfuellungenErledigt = m.tankfuellungenErledigt.filter(i => i !== idx);
    }
    render();
  }
  massnahmenToggleInFlight++;
  try{
    await apiPost('setTankfuellungStatus', { massnahmeId, index, erledigt });
  }catch(err){ toast('Fehler: ' + err.message); await syncOperativeData(false); }
  finally{ massnahmenToggleInFlight--; }
}

async function handleFlaecheErledigtToggle(massnahmeId, flaecheId, erledigt){
  // Sofort lokal spiegeln, damit die Checkbox nicht "zurückspringt" während die Anfrage läuft
  const m = state.massnahmen.find(x => x.id === massnahmeId);
  if (m){
    m.flaechenErledigt = m.flaechenErledigt || [];
    if (erledigt){
      if (!m.flaechenErledigt.includes(flaecheId)) m.flaechenErledigt.push(flaecheId);
    } else {
      m.flaechenErledigt = m.flaechenErledigt.filter(id => id !== flaecheId);
    }
    render();
  }
  massnahmenToggleInFlight++;
  try{
    await apiPost('setFlaecheErledigtStatus', { massnahmeId, flaecheId, erledigt });
  }catch(err){ toast('Fehler: ' + err.message); await syncOperativeData(false); }
  finally{ massnahmenToggleInFlight--; }
}

/* ============================================================
   UTIL
   ============================================================ */
function escapeHtml(str){
  return String(str == null ? '' : str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function formatZahl(n){
  const num = parseFloat(n);
  if (isNaN(num)) return '0';
  return num.toLocaleString('de-DE', { maximumFractionDigits: 2 });
}
function formatDatum(iso){
  if (!iso) return '–';
  const d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso);
  return d.toLocaleDateString('de-DE');
}
function heute(){
  return new Date().toISOString().slice(0,10);
}

/* ============================================================
   INIT
   ============================================================ */
document.getElementById('syncBtn').onclick = () => syncOperativeData(true);

async function init(){
  if (APP_SCRIPT_URL.includes('HIER_DEINE')){
    document.getElementById('main').innerHTML = '<div class="card"><div class="empty">Bitte zuerst APP_SCRIPT_URL im Code eintragen (siehe SETUP.md).</div></div>';
    return;
  }
  await syncOperativeData(false);
  await loadKatalogOnce();
  setInterval(() => syncOperativeData(false, true), SYNC_INTERVAL_MS);
}
init();
